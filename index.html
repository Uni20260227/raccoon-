<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラクーンデンタル スマート問診</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f7f9fc; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 14px 18px; border-radius: 20px; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bot { background-color: white; align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .user { background-color: var(--primary-color); align-self: flex-end; color: white; }
        #input-area { background: white; padding: 20px; border-top: 1px solid #eee; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        button { padding: 12px 20px; border: 1px solid var(--primary-color); border-radius: 25px; background: white; color: var(--primary-color); cursor: pointer; font-weight: bold; }
        button:hover { background: var(--primary-color); color: white; }
        
        /* PDF出力用の隠しエリア */
        #pdf-template { display: none; padding: 40px; background: white; color: black; }
        .pdf-title { font-size: 24px; font-weight: bold; border-bottom: 2px solid black; margin-bottom: 20px; }
        .pdf-item { margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="chat-container"></div>
<div id="input-area"></div>

<div id="pdf-template">
    <div class="pdf-title">ラクーンデンタル問診票</div>
    <div id="pdf-content"></div>
    <div style="margin-top: 40px; font-size: 12px;">
        ※この問診票はチャットボットにより自動生成されました。
    </div>
</div>

<script>
    const chat = document.getElementById('chat-container');
    const controls = document.getElementById('input-area');
    let data = { name: "", birth: "", symptom: "", history: "" };

    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = `message ${type}`;
        d.innerHTML = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    function start() {
        addMsg("ラクーンデンタルへようこそ。お名前を教えてください。", "bot");
        renderInput("名前を入力...", (v) => { data.name = v; askSymptom(); });
    }

    function askSymptom() {
        addMsg(`${data.name}様ですね。本日の症状を選んでください。`, "bot");
        renderButtons([
            { l: "痛みがある", v: "痛み" },
            { l: "詰め物が取れた", v: "脱離" },
            { l: "クリーニング", v: "検診" }
        ], (v) => { data.symptom = v; askHistory(); });
    }

    function askHistory() {
        addMsg("現在、他科に通院中や服用中のお薬はありますか？", "bot");
        renderInput("例：高血圧で通院中、なし等", (v) => { data.history = v; finalize(); });
    }

    function finalize() {
        addMsg("ありがとうございます。最後に『PDFを作成』ボタンを押して、保存してください。", "bot");
        renderButtons([{ l: "問診票PDFを作成", v: "pdf" }], generatePDF);
    }

    function renderInput(ph, cb) {
        controls.innerHTML = `<input type="text" id="i" placeholder="${ph}" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">`;
        const i = document.getElementById('i');
        i.onkeypress = (e) => { if(e.key==='Enter'){ addMsg(i.value, "user"); cb(i.value); } };
    }

    function renderButtons(opts, cb) {
        controls.innerHTML = '<div class="btn-group"></div>';
        const g = controls.querySelector('.btn-group');
        opts.forEach(o => {
            const b = document.createElement('button');
            b.innerText = o.l;
            b.onclick = () => { addMsg(o.l, "user"); cb(o.v); };
            g.appendChild(b);
        });
    }

    // PDF生成ロジック
    function generatePDF() {
        const content = document.getElementById('pdf-content');
        const template = document.getElementById('pdf-template');
        
        // PDFの中身を組み立てる
        content.innerHTML = `
            <div class="pdf-item"><b>お名前：</b> ${data.name} 様</div>
            <div class="pdf-item"><b>本日の主訴：</b> ${data.symptom}</div>
            <div class="pdf-item"><b>病歴・お薬：</b> ${data.history}</div>
            <div class="pdf-item"><b>作成日：</b> ${new Date().toLocaleDateString()}</div>
        `;

        // 隠しているテンプレートを一時的に表示してPDF化
        template.style.display = 'block';
        
        const opt = {
            margin: 1,
            filename: `問診票_${data.name}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(template).save().then(() => {
            template.style.display = 'none'; // 生成後にまた隠す
        });
    }

    start();
</script>
</body>
</html>
