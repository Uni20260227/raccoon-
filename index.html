<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラクーンデンタル スマート問診 v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f7f9fc; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .bot { background-color: white; align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { background-color: var(--primary-color); align-self: flex-end; color: white; }
        #input-area { background: white; padding: 15px; border-top: 1px solid #eee; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        button { padding: 10px 15px; border: 1px solid var(--primary-color); border-radius: 20px; background: white; color: var(--primary-color); cursor: pointer; font-size: 13px; }
        button.selected { background: var(--primary-color); color: white; }
        .submit-btn { background: #28a745; color: white; border: none; font-weight: bold; width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        
        /* 確認画面用スタイル */
        .summary-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin: 10px 0; font-size: 13px; }
        .summary-table th, .summary-table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .summary-table th { background: #f9f9f9; width: 30%; }
        .edit-link { color: #e67e22; cursor: pointer; font-weight: bold; margin-left: 10px; text-decoration: underline; }

        /* ポリシー表示スタイル */
        .policy-content { font-size: 11px; color: #555; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; max-height: 200px; overflow-y: auto; margin: 10px 0; }
        
        /* PDF用 */
        #pdf-template { display: none; padding: 30px; background: white; width: 750px; color: black; font-size: 12px; }
    </style>
</head>
<body>

<div id="chat-container"></div>
<div id="input-area"></div>

<div id="pdf-template">
    <div style="text-align:center; font-size:22px; font-weight:bold; border-bottom:2px solid #000; margin-bottom:15px;" id="p-title">問診票</div>
    <div id="p-body"></div>
    <div style="font-size:10px; margin-top:20px; border-top:1px dashed #333; padding-top:10px;">
        ※本内容はデジタル問診により患者本人が入力・同意したものです。
    </div>
</div>

<script>
    const chat = document.getElementById('chat-container');
    const controls = document.getElementById('input-area');
    let isChild = false;
    let data = { name: "", birth: "", address: "", reason: "", symptoms: [], parts: [], history: "" };

    function msg(t, s) {
        const d = document.createElement('div'); d.className = `message ${s}`; d.innerHTML = t;
        chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
    }

    // --- シナリオ ---
    function start() {
        msg("ラクーンデンタルへようこそ。問診を開始します。", "bot");
        btns([{l:"成人用",v:"adult"}, {l:"小児用",v:"child"}], (v) => { isChild = (v === "child"); askName(); });
    }

    function askName() {
        msg("お名前（ふりがな）を教えてください。", "bot");
        input("例：新井 敬（あらい たかし）", (v) => { data.name = v; askBirth(); });
    }

    function askBirth() {
        msg("生年月日をお願いします。", "bot");
        input("例：1988/12/10", (v) => { data.birth = v; askReason(); });
    }

    function askReason() {
        msg("当院を選んだ理由を教えてください。", "bot");
        btns([{l:"紹介",v:"紹介"},{l:"近所",v:"近所"},{l:"HP",v:"HP"},{l:"SNS",v:"SNS"}], (v) => { data.reason = v; askSymptoms(); });
    }

    function askSymptoms() {
        msg("本日の症状を選択してください（複数可）。", "bot");
        const opts = ["痛み", "腫れ", "取れた", "歯周病", "歯の色", "いびき", "歯並び", "全部治したい"];
        multiBtns(opts, (res) => { data.symptoms = res; askParts(); });
    }

    function askParts() {
        msg("気になる部位を選択してください（複数可）。", "bot");
        const opts = ["右上奥", "上前歯", "左上奥", "右下奥", "下前歯", "左下奥", "顎", "頬", "舌"];
        multiBtns(opts, (res) => { data.parts = res; askHistory(); });
    }

    function askHistory() {
        msg("現在・過去の病気や飲んでいるお薬を教えてください。", "bot");
        input("病気やアレルギー、薬名など", (v) => { data.history = v; showSummary(); });
    }

    // --- 確認・修正機能 ---
    function showSummary() {
        msg("これまでの入力内容を確認してください。修正したい場合は『修正』を押してください。", "bot");
        let html = '<table class="summary-table">';
        const items = [
            { k: "名前", v: data.name, f: askName },
            { k: "生年月日", v: data.birth, f: askBirth },
            { k: "理由", v: data.reason, f: askReason },
            { k: "症状", v: data.symptoms.join(', '), f: askSymptoms },
            { k: "部位", v: data.parts.join(', '), f: askParts },
            { k: "病歴", v: data.history, f: askHistory }
        ];
        items.forEach((item, i) => {
            html += `<tr><th>${item.k}</th><td>${item.v} <span class="edit-link" onclick="editStep(${i})">修正</span></td></tr>`;
        });
        html += '</table>';
        msg(html, "bot");
        btns([{l:"内容に間違いありません", v:"confirm"}], showPolicy);
    }

    window.editStep = (index) => {
        const steps = [askName, askBirth, askReason, askSymptoms, askParts, askHistory];
        msg("修正箇所に戻ります。", "bot");
        steps[index]();
    };

    // --- ポリシー表示 --- 
    function showPolicy() {
        const policyHtml = `
            <div class="policy-content">
                <b>【キャンセルポリシー】</b><br>
                ご予約の変更は、予約の前々日までにお電話かWEBにてお願いします。前日・当日の急な変更は、保険診療3300円、自費診療5500円が次回の診療で発生する場合がございます。<br><br>
                <b>【治療算定・費用について】</b><br>
                保険診療の規定により、入れ歯の調整など月に2回目以降に関しては、別途費用がかかります。<br><br>
                <b>【個人情報等の取り扱い】</b><br>
                ご記入いただいた内容は、診療の目的以外には使用いたしません。
            </div>
        `;
        msg("最後に、当院のポリシーをご確認ください。", "bot");
        msg(policyHtml, "bot");
        btns([{l:"同意してPDFを保存", v:"ok"}], generatePDF);
    }

    // --- UI Helpers ---
    function input(ph, cb) {
        controls.innerHTML = `<input type="text" id="t-in" placeholder="${ph}">`;
        const i = document.getElementById('t-in');
        i.onkeypress = (e) => { if(e.key==='Enter' && i.value){ msg(i.value, "user"); cb(i.value); } };
    }
    function btns(os, cb) {
        controls.innerHTML = '<div class="btn-group"></div>';
        os.forEach(o => {
            const b = document.createElement('button'); b.innerText = o.l;
            b.onclick = () => { msg(o.l, "user"); cb(o.v); };
            controls.querySelector('.btn-group').appendChild(b);
        });
    }
    function multiBtns(os, cb) {
        controls.innerHTML = '<div class="btn-group" id="m-g"></div>';
        let sel = [];
        os.forEach(o => {
            const b = document.createElement('button'); b.innerText = o;
            b.onclick = () => { b.classList.toggle('selected'); if(b.classList.contains('selected')) sel.push(o); else sel = sel.filter(x=>x!==o); };
            document.getElementById('m-g').appendChild(b);
        });
        const s = document.createElement('button'); s.innerText = "決定"; s.className = "submit-btn";
        s.onclick = () => { if(sel.length>0){ msg(sel.join(', '), "user"); cb(sel); } };
        controls.appendChild(s);
    }

    function generatePDF() {
        const t = document.getElementById('pdf-template');
        const b = document.getElementById('p-body');
        document.getElementById('p-title').innerText = isChild ? "問診票【小児用】" : "問診票【成人用】";
        
        b.innerHTML = `
            <p><b>お名前:</b> ${data.name}</p>
            <p><b>生年月日:</b> ${data.birth}</p>
            <p><b>選んだ理由:</b> ${data.reason}</p>
            <p><b>本日の症状:</b> ${data.symptoms.join(', ')}</p>
            <p><b>部位:</b> ${data.parts.join(', ')}</p>
            <p><b>既往歴・お薬:</b> ${data.history}</p>
            <p><b>同意日:</b> ${new Date().toLocaleDateString()}</p>
            <p style="font-size:10px; color:gray;">キャンセルポリシーに同意済み</p>
        `;
        
        t.style.display = 'block';
        html2pdf().from(t).set({margin:0.5, filename:`問診票_${data.name}.pdf`}).save().then(()=>t.style.display='none');
    }

    start();
</script>
</body>
</html>
